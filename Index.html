<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#090b0f">
<title>PATF TCG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
  <script type="module" src="firebase/firebase.js"></script>

  <style>
:root {
  --bg: #090b0f;
  --bg2: #0f1218;
  --bg3: #161b26;
  --border: #252d40;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --red: #d45050;
  --blue: #4c7bc9;
  --green: #4caa6a;
  --text: #e8e4d8;
  --text2: #7a7060;
  --hearts: #e06060;
  --spades: #7aade8;
  --clubs: #5ac880;
  --diamonds: #e8c050;
  --neutral: #a09880;
  --purple: #9060d0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--bg); color: var(--text);
  /* Bloquear seleção de texto e menu de contexto no mobile */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  /* Evitar callout (menu de copiar/colar iOS) */
  -webkit-touch-callout: none;
  /* Impedir zoom por duplo toque */
  touch-action: manipulation;
}

/* ══ GAME CANVAS — RESOLUÇÃO BASE ══ */
#game-canvas {
  position: relative;
  width: 1280px;
  height: 720px;
  overflow: hidden;
  transform-origin: top left;
  background: var(--bg);
}

/* ══ ORIENTAÇÃO: FORÇAR LANDSCAPE ══ */
#rotate-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
#rotate-overlay .rot-icon {
  font-size: 56px;
  animation: rot-spin 1.8s ease-in-out infinite;
}
#rotate-overlay .rot-text {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--gold);
  text-align: center;
}
#rotate-overlay .rot-sub {
  font-size: 12px;
  color: var(--text2);
  text-align: center;
}
@keyframes rot-spin {
  0%   { transform: rotate(0deg); }
  40%  { transform: rotate(90deg); }
  60%  { transform: rotate(90deg); }
  100% { transform: rotate(0deg); }
}
@media (orientation: portrait) {
  #rotate-overlay { display: flex; }
}

/* SCREENS */
.screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; overflow-y: auto; }
.screen.active { display: flex; }
  </style>
